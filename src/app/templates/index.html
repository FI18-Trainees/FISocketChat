<!doctype html>
<html class="h-100 w-100 overflow-hidden">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
        <title>Socket.IO chat</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
              integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
              crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css"
              integrity="sha384-KA6wR/X5RY4zFAHpv/CnoG2UW1uogYfdnP67Uv7eULvTveboZJg0qUpmJZb5VqzN"
              crossorigin="anonymous">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" 
              integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN"
              crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.9/dist/css/bootstrap-select.min.css"
              integrity="sha384-YT6Vh7LpL+LTEi0RVF6MlYgTcoBIji2PmGBbXk3D4So5lw1e64pyuwTtbLOED1Li"
              crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/gitbrent/bootstrap4-toggle@3.6.1/css/bootstrap4-toggle.min.css"
              integrity="sha384-yakM86Cz9KJ6CeFVbopALOEQGGvyBFdmA4oHMiYuHcd9L59pLkCEFSlr6M9m434E"
              crossorigin="anonymous">
        <link rel="stylesheet" href="/public/css/general.css">
        <link rel="stylesheet" href="/public/css/normietheme.css" id="themecss">
        <link rel="stylesheet" href="/public/css/nanoscroller.css">
        <link rel="stylesheet" href="/public/css/responsive.css">

        <meta property="og:title" content="FIChat">
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
        <meta property="og:description" content="Better than Skype">
        <meta property="og:image"
              content="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Skype-for-Business.svg/1200px-Skype-for-Business.svg.png">
</head>
<body class="bg-dark text-white d-flex flex-column justify-content-start h-100 w-100 overflow-hidden">
    <nav class="navbar navbar-dark bg-dark border-bottom d-flex flex-nowrap" id="navbar">
        <div class="navbar-brand">
            <div class="d-block">
                <span class="badge badge-pill" id="online-status">Disconnected</span>
            </div>
        </div>
        <div class="nav-item rounded ml-2 mr-auto" id="username-item" style="display: block"><input type="text" placeholder="username"
                                                                             id="user_name"></div>
        <div class="navbar-brand ml-2 d-none d-lg-block">
            <i class="fab fa-skype fa-spin align-center d-inline-block" style="color: #00aff0;" title="Skype rotiert"></i>
            Super cheap chat with sock(et)?s <i class="fas fa-socks d-inline-block align-center"></i>
        </div>
        <div class="nav-item mr-4 ml-auto text-nowrap d-none d-sm-block form-check-inline">
            <label class="form-check-label" for="autoscroll">Autoscroll:</label>
            <input type="checkbox" id="autoscroll" class="form-check-input" checked onclick="setautoscroll(this.checked);">
        </div>
        <div class="nav-item mr-4 ml-auto text-nowrap d-none d-sm-block" id="usercount">Usercount: 0</div>
        <div class="nav-link text-white text-nowrap d-none d-md-block" id="powered-by">Powered by <a href="https://python.org" target="_blank"
                                                                       class="text-white">Python</a></div>
    </nav>
    <div class="content-wrapper h-100">
        <div class="container sitebar d-none d-md-block m-0">
            <div class="sitebar-content" id="logininfo_sitebar">
                <div class="media d-inline-flex text-decoration-none bg-lighter-01 rounded p-2 w-100">
                    <div class="media-body">
                        <h5 class="mt-0 mb-1 text-white text-wrap">Info</h5>
                        <span id="logininfo_name">Not logged in.</span>
                    </div>
                    <img src="" class="mx-2 rounded-circle"
                         alt="x" id="logininfo_picture"/>
                </div>
            </div>
            <div class="sitebar-content">
                <a href="https://github.com/FI18-Trainees/FISocketChat" target="_blank">
                    <div class="media d-inline-flex text-decoration-none bg-lighter-01 rounded p-2 w-100">
                        <div class="media-body">
                            <h5 class="mt-0 mb-1 text-white text-wrap">GitHub</h5>
                            Check out our Repo.
                        </div>
                        <i class="fab fa-github fa-2x text-white mx-2"></i>
                    </div>
                </a>
            </div>
            <div class="sitebar-content">
                <a href="https://tools.zaanposni.com/sorry/private/index.html" target="_blank">
                    <div class="media d-inline-flex text-decoration-none bg-lighter-01 rounded p-2 w-100">
                        <div class="media-body">
                            <h5 class="mt-0 mb-1 text-white text-wrap">Entschuldigungstool</h5>
                            Entschuldige dich jetzt!
                        </div>
                        <i class="fas fa-envelope-open-text fa-2x text-white mx-2"></i>
                    </div>
                </a>
            </div>
            <div class="sitebar-content">
                <a href="https://drive.google.com/drive/folders/1Ea9cyKQX5EyTO0DLAGRnznkjB6sNfs7u?usp=sharing" target="_blank">
                    <div class="media d-inline-flex text-decoration-none bg-lighter-01 rounded p-2 w-100">
                        <div class="media-body">
                            <h5 class="mt-0 mb-1 text-white text-wrap">GoogleDrive-Ablage</h5>
                            Falls du mal was notieren möchtest!
                        </div>
                        <i class="fab fa-google-drive fa-2x text-white mx-2"></i>
                    </div>
                </a>
            </div>
            <div class="sitebar-content" id="notify-mode">
                <div class="media d-inline-flex bg-lighter-01 rounded p-2 w-100">
                    <div class="media-body">
                        <h5 class="mt-0 mb-1 text-white text-wrap w-100">Notification-Modus</h5>
                        <div class="select-wrapper w-100 position-relative">
                            <select class="selectpicker" data-icon-base="fa" name="notificationmode" size="1" id="notification-mode">
                                <option class="bg-grey text-white my-1" data-icon="fa-bell-slash" value="no">Keine Notifications</option>
                                <option class="bg-grey text-white my-1" data-icon="fa-bullhorn" value="mention">Nur bei Mentions</option>
                                <option class="bg-grey text-white my-1" data-icon="fa-bell" value="all">Alle Notifications</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="sitebar-content">
                <div class="media d-inline-flex bg-lighter-01 rounded p-2 w-100">
                    <div class="media-body">
                        <h5 class="mt-0 mb-1 text-white text-wrap">Design ändern</h5>
                        <input type="checkbox" data-toggle="toggle" data-onstyle="outline-success" data-offstyle="outline-light"
                           data-on="Weeb<br>Theme" data-off="Normie<br>Theme" data-size="small" id="theme-toggle">
                    </div>
                    <i class="fas fa-adjust fa-2x text-white mx-2"></i>
                </div>
            </div>
        </div>
        <div class="container d-flex flex-column h-100">
            <div class="chat mb-2 mt-2 h-100 overflow-hidden nano">
                <div class="text-break nano-content" id="messages" onwheel="messagesScroll(event);">
                    <!--messages go here-->
                </div>
            </div>
            <div class="notification-box position-sticky text-white bg-discord-red w-100" id="errorbox"></div>
            <div class="notification-box position-sticky text-white bg-discord-blue w-100" id="infobox"></div>
            <div class="message-input w-100 mb-2 border-top p-2 d-inline-flex">
                <div class="btn-group pr-2 position-relative d-inline-block overflow-hidden">
                        <button class="btn btn-secondary rounded text-white border-0 font-weight-bolder cursor-pointer h-100" id="fileinput-btn">
                            <i class="far fa-file"></i>
                        </button>
                        <input type="file" name="file" id="fileinput" accept="image/*"/>
                </div>
                <form class="align-items-top d-flex justify-content-between w-100" id="form">
                    <div class="btn-group emote-dropup mr-2 position-relative">
                        <button type="button" class="btn btn-secondary rounded text-white border-0 font-weight-bolder" id="emotebtn"
                                aria-haspopup="true" aria-expanded="false">
                            <i class="far fa-smile"></i>
                        </button>
                        <div class="emote-dropmenu bg-dark border border-info" id="emoteMenu">If you see this, the Javascript failed :(</div>
                    </div>
                    <textarea class="message-box flex-fill border-0 text-white bg-dark" id="messageinput" autofocus="autofocus" autocomplete="off" spellcheck="false" placeholder="Your message..."></textarea>
                    <button class="btn rounded ml-2 text-white border-0" id="sendbtn">Send</button>
                </form>
            </div>
            <!--<div class="container sitebar border-none"></div>-->
        </div>
    </div>
        <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"
                integrity="sha384-HHKD5G6fqvxz/wBz7BFYeOPzBKELGIZv5l5HAECcXD3zdAS6n8OppmPH9ZxGXY0G"
                crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"
                integrity="sha384-vk5WoKIaW/vJyUAd9n/wmopsmNhiy+L2Z+SBxGYnUkunIxVxAv/UtMOhba/xskxh"
                crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
                integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
                crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
                integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
                crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.9/dist/js/bootstrap-select.min.js"
                integrity="sha384-V2ETvVMpY0zaj0P3nwnqTUqHU19jQInctJYWqgEQE/5vFaU3fWdcMfufqV/8ISD7"
                crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/gitbrent/bootstrap4-toggle@3.6.1/js/bootstrap4-toggle.min.js"
                integrity="sha384-Q9RsZ4GMzjlu4FFkJw4No9Hvvm958HqHmXI9nqo5Np2dA/uOVBvKVxAvlBQrDhk4"
                crossorigin="anonymous"></script>
        <script type="text/javascript" src="/public/js/script.js"></script>
        <script type="text/javascript" src="/public/js/jquery.nanoscroller.min.js"></script>
        <script type="text/javascript">$(".nano").nanoScroller();</script>
        <script type="text/javascript" src="/public/js/notify.js"></script>
        <script type="text/javascript" src="public/js/designswitch.js"></script>
    </body>
</html>
